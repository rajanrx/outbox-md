name: docker-publish

# Builds the server image and pushes it to Docker Hub (rajanrauniyar/outbox-md).
# Publishes ONLY on a version tag:
#   - push a v* tag (e.g. v1.2.3) -> :1.2.3, :1.2, :latest
#   - or trigger manually via workflow_dispatch
# Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub
# access token with Read & Write). Skipped on forks (no secrets there).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Don't run on forks — they won't have the Docker Hub secrets.
    if: github.repository == 'rajanrx/outbox-md'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: rajanrauniyar/outbox-md
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
