name: release-please

# Automated releases. On every push to main, release-please opens/updates a
# "Release PR" that bumps the version (from Conventional Commits) and updates
# CHANGELOG.md. Merging that PR tags vX.Y.Z + creates a GitHub Release, and the
# publish job below builds + pushes the multi-arch image to Docker Hub.
#
# Publishing is a downstream job in THIS workflow (not the separate
# docker-publish workflow) because a tag created by the default GITHUB_TOKEN
# does not re-trigger tag-based workflows. Requires secrets DOCKERHUB_USERNAME /
# DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'rajanrx/outbox-md'
    outputs:
      created: ${{ steps.rp.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # main now carries the version bump release-please just committed + tagged.
      - uses: actions/checkout@v4

      - name: Read released version from the manifest
        id: ver
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: rajanrauniyar/outbox-md
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    # Cross-compile the CLI for darwin/linux × amd64/arm64 and attach the static
    # binaries + checksums to the GitHub Release that release-please just cut.
    # These are what install.sh downloads. One job (not a matrix) so all binaries
    # share a single checksums.txt and a single upload.
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # main now carries the version bump + tag release-please just created.
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      # The Go binary embeds web/dist via go:embed (web/embed.go), but the built
      # assets are gitignored — only the placeholder index.html is committed. Build
      # the web UI first (mirroring the Dockerfile's `web` stage) or every released
      # binary would embed a bare index.html whose /assets/*.js 404 at runtime.
      - name: Build the embedded web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Read released version from the manifest
        id: ver
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile static binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            echo "building outbox_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/outbox_${os}_${arch}" ./cmd/outbox-md
          done
          ( cd dist && sha256sum outbox_* > checksums.txt )
          cat dist/checksums.txt

      - name: Upload binaries to the release
        # release-please now tags releases as v<version> (include-v-in-tag +
        # include-component-in-tag:false); asset names match install.sh's outbox_<os>_<arch>.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gh release upload "v${VERSION}" dist/outbox_* dist/checksums.txt --clobber

  # Auto-bump the Homebrew tap formula (rajanrx/homebrew-tap) to the new release,
  # so `brew upgrade outbox-md` tracks releases with no manual step. Needs a repo
  # secret HOMEBREW_TAP_TOKEN — a PAT with contents:write on the tap repo (the
  # default GITHUB_TOKEN can't push cross-repo). Absent token → the job no-ops.
  homebrew:
    needs: [release-please, binaries]
    if: needs.release-please.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read released version from the manifest
        id: ver
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Bump the tap formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping formula bump. Add a PAT with contents:write on rajanrx/homebrew-tap."
            exit 0
          fi
          gh release download "v${VERSION}" --repo "${GITHUB_REPOSITORY}" -p checksums.txt --clobber
          sha() { awk -v f="$1" '$2==f{print $1}' checksums.txt; }
          DARWIN_ARM=$(sha outbox_darwin_arm64); DARWIN_AMD=$(sha outbox_darwin_amd64)
          LINUX_ARM=$(sha outbox_linux_arm64);   LINUX_AMD=$(sha outbox_linux_amd64)
          BASE="https://github.com/rajanrx/outbox-md/releases/download/v${VERSION}"

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/rajanrx/homebrew-tap.git" tap
          cat > tap/Formula/outbox-md.rb <<EOF
          class OutboxMd < Formula
            desc "Local-first, agent-agnostic review for AI-generated Markdown specs"
            homepage "https://github.com/rajanrx/outbox-md"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/outbox_darwin_arm64"
                sha256 "${DARWIN_ARM}"
              end
              on_intel do
                url "${BASE}/outbox_darwin_amd64"
                sha256 "${DARWIN_AMD}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/outbox_linux_arm64"
                sha256 "${LINUX_ARM}"
              end
              on_intel do
                url "${BASE}/outbox_linux_amd64"
                sha256 "${LINUX_AMD}"
              end
            end

            def install
              bin.install Dir["outbox_*"].first => "outbox"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/outbox version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/outbox-md.rb
          git commit -m "outbox-md ${VERSION}" || { echo "formula already current"; exit 0; }
          git push
