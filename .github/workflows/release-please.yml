name: release-please

# Automated releases. On every push to main, release-please opens/updates a
# "Release PR" that bumps the version (from Conventional Commits) and updates
# CHANGELOG.md. Merging that PR tags vX.Y.Z + creates a GitHub Release, and the
# publish job below builds + pushes the multi-arch image to Docker Hub.
#
# Publishing is a downstream job in THIS workflow (not the separate
# docker-publish workflow) because a tag created by the default GITHUB_TOKEN
# does not re-trigger tag-based workflows. Requires secrets DOCKERHUB_USERNAME /
# DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'rajanrx/outbox-md'
    outputs:
      created: ${{ steps.rp.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # main now carries the version bump release-please just committed + tagged.
      - uses: actions/checkout@v4

      - name: Read released version from the manifest
        id: ver
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: rajanrauniyar/outbox-md
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
