services:
  outbox-md:
    # Published image (Docker Hub). `docker compose pull` fetches it; a local
    # clone still rebuilds from source with `docker compose up --build`.
    image: rajanrauniyar/outbox-md:latest
    build: .
    ports:
      # host:container — change the host side if 8181 is taken
      - "8181:8181"
    volumes:
      # Folder of .md files to review. Defaults to this repo's specs; override
      # with OUTBOX_DIR=path/to/your/specs. Long syntax + type:bind so a bare
      # relative path (e.g. OUTBOX_DIR=docs/specs) is treated as a host bind
      # mount, not a named volume.
      - type: bind
        source: ${OUTBOX_DIR:-./docs/specs}
        target: /data
    environment:
      # Set OUTBOX_DEV=1 to enable the HTTP "simulate agent" endpoints.
      OUTBOX_DEV: "${OUTBOX_DEV:-0}"
    restart: unless-stopped
    # Auto-update (Watchtower, below) matches on the image tag. For hands-off
    # updates that won't jump a breaking major, pin a major tag instead of
    # :latest — e.g. image: rajanrauniyar/outbox-md:0

  # Opt-in auto-update for the container. Uncomment to have Watchtower watch the
  # outbox-md image, pull new versions, and recreate the container automatically
  # (the Docker equivalent of the binary's auto_update). Pin the tag above to :0
  # so it applies 0.x minors/patches but not a breaking major.
  # watchtower:
  #   image: containrrr/watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --cleanup --interval 3600 outbox-md
